# Site settings
baseURL = "https://cushay.github.io"
languageCode = "en-US"
title = "Christopher Ushay"
theme = "hugo-split-theme"
disableKinds = ["section", "taxonomy", "taxonomyTerm", "RSS", "sitemap"]

# Local preview mode
relativeURLs = true
uglyURLs = true

# Enter your tracking code to enable Google Analytics
googleAnalytics = ""

# Copyright
copyright = "&copy;2024 Christopher Ushay"

[params]

  # Metadata for search engines and social sharing
  author = "Christopher Ushay"
  # description = "Split is a centrally-divided layout for a professional online presence with a big image or video left with alongside content."
  # shareImage = "images/social.jpg"
  twitterHandle = "cmushay"

  # Favicon
  favicon = "favicon.ico"

  # Section - Visual
  [params.visual]

    # Image
    [params.visual.image]
      enable = true
      file = "images/background.jpg"
      position = "center center"

    # Video
    [params.visual.video]
      enable = false
      mute = true
      file = "videos/background.mp4"
      # youtubeId = "dk9uNWPP7EA"

  # Links
  #
  # Links List #1
  [[params.links]]
    [params.links.list1]
      heading = "Portfolio"

      [[params.links.list1.link]]
        text = "About Me"
        url = "christopherushay.com/about/"
        new_tab = false

      [[params.links.list1.link]]
        text = "Research"
        url = "christopherushay.com/research/"
        new_tab = false

      [[params.links.list1.link]]
        text = "CV"
        url = "#"

  # Links List #2
  [[params.links]]
    [params.links.list2]
      heading = "Social"

      [[params.links.list2.link]]
        text = "Twitter"
        url = "https://twitter.com/CMUshay/"
        new_tab = true

      [[params.links.list2.link]]
        text = "Instagram"
        url = "https://www.instagram.com/itsalongu/"
        new_tab = true

  # Links List #3
  [[params.links]]
    [params.links.list3]
      heading = "Network"

      [[params.links.list3.link]]
        text = "Link One"
        url = "#"

      [[params.links.list3.link]]
        text = "Link Two"
        url = "#"

      [[params.links.list3.link]]
        text = "Link Three"
        url = "#"

